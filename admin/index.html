<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Milking Distribuidora</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../Logo-milking-liners.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#edf7fd', 100: '#d2eaf8', 200: '#a5d5f1', 300: '#6db9e6', 400: '#3a9bd8', 500: '#1a7dbd', 600: '#0e6399', 700: '#063b5b', 800: '#042a42', 900: '#021a2b' }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ========== LOGIN ========== -->
  <div id="login-screen" class="hidden min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <img src="../Logo-milking-liners.svg" alt="Milking" class="h-12 mx-auto mb-4">
        <h1 class="text-xl font-bold text-gray-800">Painel Administrativo</h1>
        <p class="text-sm text-gray-500 mt-1">Acesse com suas credenciais</p>
      </div>
      <form id="login-form" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" required class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none" placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input type="password" id="password" required class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none" placeholder="Sua senha">
        </div>
        <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-3 py-2"></div>
        <button type="submit" class="w-full bg-brand-700 text-white font-bold py-3 rounded-xl hover:bg-brand-800 transition-colors">Entrar</button>
      </form>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div id="dashboard-screen" class="hidden">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="../Logo-milking-liners.svg" alt="Milking" class="h-8">
          <span class="text-sm font-semibold text-gray-700">Painel de Cotacoes</span>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="showDashboard()" class="text-sm text-brand-600 hover:text-brand-800 font-medium">Atualizar</button>
          <button id="logout-btn" class="text-sm text-gray-500 hover:text-red-600 font-medium">Sair</button>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-white rounded-2xl border border-gray-200 p-5">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">Total de Cotacoes</p>
          <p id="total-quotes" class="text-3xl font-bold text-gray-800 mt-1">-</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 p-5">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">CNPJs Unicos</p>
          <p id="total-cnpjs" class="text-3xl font-bold text-gray-800 mt-1">-</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 p-5">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">Ultimos 7 dias</p>
          <p id="last-7-days" class="text-3xl font-bold text-gray-800 mt-1">-</p>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden text-center py-12">
        <svg class="animate-spin h-8 w-8 mx-auto text-brand-600" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <p class="text-sm text-gray-400 mt-2">Carregando cotacoes...</p>
      </div>

      <!-- CNPJ Table -->
      <section>
        <h2 class="text-lg font-bold text-gray-800 mb-3">CNPJs por Volume</h2>
        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">
                  <th class="px-4 py-3">CNPJ</th>
                  <th class="px-4 py-3">Revenda</th>
                  <th class="px-4 py-3">Cidade</th>
                  <th class="px-4 py-3 text-center">Cotacoes</th>
                  <th class="px-4 py-3">Ultima</th>
                </tr>
              </thead>
              <tbody id="cnpj-table-body">
                <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Recent Quotes -->
      <section>
        <h2 class="text-lg font-bold text-gray-800 mb-3">Cotacoes Recentes</h2>
        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">
                  <th class="px-4 py-3">Codigo</th>
                  <th class="px-4 py-3">CNPJ</th>
                  <th class="px-4 py-3">Revenda</th>
                  <th class="px-4 py-3">Data</th>
                  <th class="px-4 py-3 text-center">Qtd</th>
                </tr>
              </thead>
              <tbody id="recent-table-body">
                <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
